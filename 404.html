<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Space Dash Portal</title>
  <meta name="description" content="The page you are looking for does not exist on Space Dash Arcade. Return to our home station to start playing.">
  <meta name="robots" content="noindex, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  </noscript>

  <style>
    :root {
      --bg: #030014;
      --bg-card: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-muted: #d1d5db;
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.5);
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Orbitron', sans-serif;
      --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    .error-wrapper {
      padding: 3rem;
      max-width: 500px;
      width: 90%;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(139, 92, 246, 0.1);
    }

    h1 {
      font-family: var(--font-display);
      font-size: 5rem;
      font-weight: 900;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 1.8rem;
      border-radius: 9999px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: var(--transition);
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px var(--primary-glow);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--primary-glow);
    }
  </style>
</head>
<body>
  <main class="error-wrapper">
    <h1>404</h1>
    <h2>Coordinates Lost in Space</h2>
    <p>The module or sector you are trying to reach has drifted out of communication range. Let's redirect you back to the home station.</p>
    <a href="/index.html" class="btn">Return Home</a>
  </main>
</body>
</html>
